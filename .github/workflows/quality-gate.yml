# CRAPQuants Quality Gate — run on PRs to detect regressions
# Rule #49: Treat as production code
# Rule #51: SHA-pinned actions
# Rule #52: Least-privilege permissions

name: CRAPQuants Quality Gate

"on":
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'

permissions:
  contents: read
  checks: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0  # Full history for git analysis

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --only-binary :all: radon pydantic structlog rich typer polars pytest pytest-cov

      - name: Generate coverage
        run: |
          source .venv/bin/activate
          PYTHONPATH=src python -m pytest tests/ --cov=crapquants --cov-report=json -q

      - name: CRAPQuants analysis
        run: |
          source .venv/bin/activate
          PYTHONPATH=src python -m crapquants.cli analyze src/crapquants/ \
            -c coverage.json \
            -f github_actions \
            -b data/baseline.json \
            --level standard

      - name: Generate SARIF
        if: always()
        run: |
          source .venv/bin/activate
          PYTHONPATH=src python -m crapquants.cli analyze src/crapquants/ \
            -c coverage.json \
            -f sarif \
            -o crapquants.sarif || true

      # Upload SARIF for GitHub Code Scanning
      - uses: github/codeql-action/upload-sarif@4dd16135b69cb9fca2f14a82f6adc25f5c46d7f0  # v3
        if: always()
        with:
          sarif_file: crapquants.sarif
          category: crapquants
